services:
  postgres:
    image: postgres:17-alpine
    container_name: haibazo-book-review-postgres
    environment:
      POSTGRES_DB: haibazo_book_review
      POSTGRES_USER: haibazo
      POSTGRES_PASSWORD: haibazo
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haibazo -d haibazo_book_review"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: haibazo-book-review-backend
    container_name: haibazo-book-review-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/haibazo_book_review
      SPRING_DATASOURCE_USERNAME: haibazo
      SPRING_DATASOURCE_PASSWORD: haibazo
      APP_CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      APP_SEED_ENABLED: "true"
    ports:
      - "8081:8080"

volumes:
  postgres-data:
